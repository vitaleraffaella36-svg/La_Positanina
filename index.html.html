document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.

      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

slateY(18px)}to{opacity:1;transform:translateY(0)}}\n  @keyframes lp_pulse{0%{box-shadow:0 0 0 0 rgba(37,158,93,.45)}70%{box-shadow:0 0 0 16px rgba(37,158,93,0)}100%{box-shadow:0 0 0 0 rgba(37,158,93,0)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100%;background:#FBF6EC;overflow-x:hidden\">\n\n  <!-- ============ HEADER ============ -->\n  <header style=\"position:sticky;top:0;z-index:60;background:rgba(251,246,236,.86);backdrop-filter:blur(10px);border-bottom:1px solid #EADFC9\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:14px clamp(18px,4vw,40px);display:flex;align-items:center;justify-content:space-between;gap:18px\">\n      <a href=\"#home\" style=\"display:flex;align-items:center;gap:12px;text-decoration:none\">\n        <img src=\"5dbba86c-7d36-4fd2-894d-fd90cc8d298e\" alt=\"La Positanina\" style=\"width:{{ logoSize }};height:{{ logoSize }};border-radius:50%;object-fit:cover;box-shadow:0 3px 10px rgba(44,62,99,.18)\">\n        <span style=\"white-space:nowrap;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;font-size:{{ brandSize }};color:#2C3E63;letter-spacing:.3px\">La Positanina<\u002Fspan>\n      <\u002Fa>\n\n      <sc-if value=\"{{ showDesktopNav }}\" hint-placeholder-val=\"{{ true }}\">\n        <nav style=\"display:flex;align-items:center;gap:18px\">\n          <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"6\">\n            <a href=\"{{ n.href }}\" style=\"white-space:nowrap;text-decoration:none;color:#4A463E;font-size:14px;font-weight:500;letter-spacing:.2px;padding-bottom:3px;border-bottom:1.5px solid transparent\" style-hover=\"border-bottom:1.5px solid #CDA85A;color:#2C3E63\">{{ n.label }}<\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fnav>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;align-items:center;gap:10px\">\n        <a href=\"{{ instagram }}\" rel=\"noopener\" aria-label=\"Instagram\" style=\"width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#2C3E63;background:#fff;border:1px solid #EADFC9;text-decoration:none\" style-hover=\"background:#F3E3AE;border-color:#F3E3AE\">\n          <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><rect x=\"2\" y=\"2\" width=\"20\" height=\"20\" rx=\"5.5\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"4.2\"><\u002Fcircle><circle cx=\"17.4\" cy=\"6.6\" r=\"1.1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fa>\n        <button sc-camel-on-click=\"{{ openCart }}\" aria-label=\"Carrello\" style=\"position:relative;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#2C3E63;background:#fff;border:1px solid #EADFC9;cursor:pointer\" style-hover=\"background:#F3E3AE;border-color:#F3E3AE\">\n          <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><path d=\"M6 7h13l-1.4 9.5a2 2 0 0 1-2 1.7H9.4a2 2 0 0 1-2-1.7L6 4H3\"><\u002Fpath><circle cx=\"9.5\" cy=\"20.5\" r=\"1.1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><circle cx=\"16\" cy=\"20.5\" r=\"1.1\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n          <sc-if value=\"{{ hasCart }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"position:absolute;top:-3px;right:-3px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:#CDA85A;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center\">{{ cart }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fbutton>\n        <sc-if value=\"{{ showHamburger }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ toggleMenu }}\" aria-label=\"Menu\" style=\"width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#2C3E63;background:#fff;border:1px solid #EADFC9;cursor:pointer\">\n            <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M4 7h16M4 12h16M4 17h16\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ mobilePanelOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <nav style=\"border-top:1px solid #EADFC9;background:#FBF6EC;padding:8px clamp(18px,4vw,40px) 16px;display:flex;flex-direction:column;gap:2px\">\n        <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"6\">\n          <a href=\"{{ n.href }}\" sc-camel-on-click=\"{{ closeMenu }}\" style=\"text-decoration:none;color:#3A3733;font-size:16px;font-weight:500;padding:11px 6px;border-bottom:1px solid #F0E7D4\">{{ n.label }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fnav>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <!-- ============ HERO ============ -->\n  <section id=\"home\" style=\"position:relative;background:linear-gradient(160deg,#FDFAF1 0%,#F3EAD6 60%,#E7DFC9 100%)\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(40px,6vw,82px) clamp(18px,4vw,40px);display:grid;grid-template-columns:{{ heroCols }};gap:clamp(30px,5vw,64px);align-items:center\">\n      <div>\n        <div style=\"display:inline-flex;align-items:center;gap:9px;padding:6px 15px;border-radius:30px;background:#fff;border:1px solid #EADFC9;color:#5B7DA6;font-size:12.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:24px\">\n          <span style=\"width:6px;height:6px;border-radius:50%;background:#CDA85A\"><\u002Fspan> Vico Equense · Napoli\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(38px,6vw,68px);line-height:1.03;color:#2C3E63;margin:0 0 22px;letter-spacing:.3px\">Borsette crochet<br>fatte a mano a<br><span style=\"font-style:italic;color:#5B7DA6\">Vico Equense<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:clamp(16px,2vw,19px);line-height:1.65;color:#6E675A;max-width:480px;margin:0 0 32px\">Colori mediterranei, dettagli artigianali e modelli personalizzabili firmati La Positanina.<\u002Fp>\n        <div style=\"display:flex;flex-direction:{{ heroCtaDir }};flex-wrap:wrap;gap:14px\">\n          <a href=\"#collezione\" style=\"text-decoration:none;background:#2C3E63;color:#FBF6EC;padding:15px 30px;border-radius:40px;font-weight:600;font-size:15px;text-align:center;box-shadow:0 10px 24px rgba(44,62,99,.22)\" style-hover=\"background:#22304e\">Scopri la collezione<\u002Fa>\n          <a href=\"#personalizzate\" style=\"text-decoration:none;background:#fff;color:#2C3E63;padding:15px 30px;border-radius:40px;font-weight:600;font-size:15px;text-align:center;border:1.5px solid #DCCFB2\" style-hover=\"border-color:#CDA85A;background:#FFFCF4\">Richiedi una borsa personalizzata<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:26px;margin-top:38px;flex-wrap:wrap\">\n          <div><div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#2C3E63;line-height:1\">100%<\u002Fdiv><div style=\"font-size:13px;color:#8A8377;margin-top:2px\">Fatto a mano<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#DCCFB2\"><\u002Fdiv>\n          <div><div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#2C3E63;line-height:1\">Su misura<\u002Fdiv><div style=\"font-size:13px;color:#8A8377;margin-top:2px\">Colori e modelli<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#DCCFB2\"><\u002Fdiv>\n          <div><div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#2C3E63;line-height:1\">Pezzo unico<\u002Fdiv><div style=\"font-size:13px;color:#8A8377;margin-top:2px\">Lavorazione lenta<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:relative\">\n        <div style=\"position:relative;aspect-ratio:4/5;border-radius:26px;overflow:hidden;box-shadow:0 30px 60px rgba(44,62,99,.18);border:1px solid rgba(255,255,255,.6);background-color:#CBDDE8;background-image:radial-gradient(circle at 6px 6px,rgba(255,255,255,.5) 1.8px,transparent 2.3px),radial-gradient(circle at 16px 16px,rgba(44,62,99,.08) 1.8px,transparent 2.3px);background-size:20px 20px\">\n          <img src=\"{{ heroImg }}\" sc-camel-on-error=\"{{ hideImg }}\" alt=\"Borsa crochet La Positanina\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\">\n        <\u002Fdiv>\n        <div style=\"position:absolute;bottom:{{ heroBadgeBottom }};left:{{ heroBadgeLeft }};background:#fff;border-radius:18px;padding:14px 18px;box-shadow:0 14px 34px rgba(44,62,99,.16);display:flex;align-items:center;gap:12px;border:1px solid #F0E7D4\">\n          <div style=\"width:42px;height:42px;border-radius:50%;background:#F3E3AE;display:flex;align-items:center;justify-content:center;font-size:22px\">🧶<\u002Fdiv>\n          <div><div style=\"font-weight:700;font-size:14px;color:#2C3E63\">Cotone premium<\u002Fdiv><div style=\"font-size:12px;color:#8A8377\">filato selezionato a mano<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ COLLEZIONE ============ -->\n  <section id=\"collezione\" style=\"max-width:1240px;margin:0 auto;padding:clamp(56px,8vw,100px) clamp(18px,4vw,40px)\">\n    <div style=\"text-align:center;max-width:600px;margin:0 auto 40px\">\n      <div style=\"font-size:13px;font-weight:600;letter-spacing:2.4px;text-transform:uppercase;color:#CDA85A;margin-bottom:12px\">La collezione<\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(30px,4.5vw,46px);color:#2C3E63;margin:0 0 14px;line-height:1.08\">Modelli pensati per il sole<\u002Fh2>\n      <p style=\"font-size:16.5px;line-height:1.6;color:#6E675A;margin:0\">Ogni borsa è realizzata su ordinazione. Scegli un modello pronto o partiamo insieme da un'idea tutta tua.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:42px\">\n      <sc-for list=\"{{ filters }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <button sc-camel-on-click=\"{{ f.onClick }}\" style=\"padding:9px 20px;border-radius:30px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid {{ f.border }};background:{{ f.bg }};color:{{ f.color }}\">{{ f.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:26px\">\n      <sc-for list=\"{{ products }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <article style=\"background:#fff;border-radius:20px;overflow:hidden;border:1px solid #F0E7D4;box-shadow:0 6px 22px rgba(44,62,99,.06);display:flex;flex-direction:column\" style-hover=\"box-shadow:0 18px 40px rgba(44,62,99,.14)\">\n          <div style=\"position:relative;aspect-ratio:1/1;background-color:{{ p.bg }};background-image:radial-gradient(circle at 5px 5px,rgba(255,255,255,.5) 1.5px,transparent 2px),radial-gradient(circle at 13px 13px,rgba(44,62,99,.07) 1.5px,transparent 2px);background-size:16px 16px\">\n            <img src=\"{{ p.img }}\" sc-camel-on-error=\"{{ hideImg }}\" alt=\"{{ p.name }}\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover\">\n            <span style=\"position:absolute;top:12px;left:12px;z-index:2;pointer-events:none;background:rgba(251,246,236,.9);color:#5B7DA6;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:4px 10px;border-radius:20px\">{{ p.cat }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:20px 20px 22px;display:flex;flex-direction:column;flex:1\">\n            <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:24px;color:#2C3E63;margin:0 0 6px\">{{ p.name }}<\u002Fh3>\n            <p style=\"font-size:14px;line-height:1.55;color:#7A7468;margin:0 0 14px;flex:1\">{{ p.desc }}<\u002Fp>\n            <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:16px\">\n              <span style=\"font-size:12px;color:#9A9282;margin-right:2px\">Colori:<\u002Fspan>\n              <sc-for list=\"{{ p.colors }}\" as=\"c\" hint-placeholder-count=\"3\">\n                <span title=\"{{ c.name }}\" style=\"width:16px;height:16px;border-radius:50%;background:{{ c.hex }};border:1.5px solid rgba(44,62,99,.14);display:inline-block\"><\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n              <span style=\"font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;color:#2C3E63\">{{ p.price }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px\">\n              <button sc-camel-on-click=\"{{ p.open }}\" style=\"flex:1;padding:11px;border-radius:30px;font-size:13.5px;font-weight:600;cursor:pointer;background:#fff;color:#2C3E63;border:1.5px solid #DCCFB2\" style-hover=\"border-color:#CDA85A\">Vedi dettagli<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ p.buy }}\" style=\"flex:1;padding:11px;border-radius:30px;font-size:13.5px;font-weight:600;cursor:pointer;background:#2C3E63;color:#FBF6EC;border:1.5px solid #2C3E63\" style-hover=\"background:#22304e\">Acquista<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n      <p style=\"text-align:center;color:#8A8377;padding:40px 0;font-size:16px\">Nessun modello in questa categoria al momento — scrivici per una creazione su misura.<\u002Fp>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- ============ PERSONALIZZATE ============ -->\n  <section id=\"personalizzate\" style=\"background:linear-gradient(150deg,#EAF1F6 0%,#F3EAD6 100%)\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(56px,8vw,100px) clamp(18px,4vw,40px);display:grid;grid-template-columns:{{ formCols }};gap:clamp(34px,5vw,64px);align-items:start\">\n      <div>\n        <div style=\"font-size:13px;font-weight:600;letter-spacing:2.4px;text-transform:uppercase;color:#CDA85A;margin-bottom:12px\">Borse personalizzate<\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(30px,4.5vw,46px);color:#2C3E63;margin:0 0 18px;line-height:1.08\">La tua borsa, esattamente come la sogni<\u002Fh2>\n        <p style=\"font-size:16.5px;line-height:1.65;color:#5E5849;margin:0 0 26px;max-width:480px\">Puoi richiedere un pezzo su misura scegliendo colori, dimensioni, modello e dettagli. Raccontaci la tua idea: la realizziamo a mano, con i tempi e la cura che merita.<\u002Fp>\n        <ul style=\"list-style:none;padding:0;margin:0 0 30px;display:flex;flex-direction:column;gap:14px\">\n          <sc-for list=\"{{ customSteps }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <li style=\"display:flex;align-items:center;gap:14px\">\n              <span style=\"flex:none;width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid #DCCFB2;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:600;color:#CDA85A;font-size:18px\">{{ s.n }}<\u002Fspan>\n              <span style=\"font-size:15.5px;color:#4A463E\">{{ s.t }}<\u002Fspan>\n            <\u002Fli>\n          <\u002Fsc-for>\n        <\u002Ful>\n        <a href=\"{{ waCustom }}\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:10px;text-decoration:none;background:#259E5D;color:#fff;padding:13px 24px;border-radius:40px;font-weight:600;font-size:15px;box-shadow:0 10px 24px rgba(37,158,93,.25)\" style-hover=\"background:#1f8a51\">\n          <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .2-3.4-.7-2.9-1.2-4.7-4.1-4.9-4.3-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.3 0 .5l-.4.6c-.2.2-.3.4-.1.7.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.5.1.7-.1l.8-1c.2-.2.4-.2.6-.1l1.9.9c.3.1.4.2.5.3.1.2.1.7-.1 1.3Z\"><\u002Fpath><\u002Fsvg>\n          Scrivimi su WhatsApp\n        <\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border-radius:24px;padding:clamp(24px,3vw,34px);box-shadow:0 18px 44px rgba(44,62,99,.12);border:1px solid #F0E7D4\">\n        <sc-if value=\"{{ formSent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:30px 6px\">\n            <div style=\"width:64px;height:64px;border-radius:50%;background:#EDF6F0;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:30px\">💛<\u002Fdiv>\n            <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:28px;color:#2C3E63;margin:0 0 10px\">Grazie di cuore!<\u002Fh3>\n            <p style=\"color:#6E675A;font-size:15.5px;line-height:1.6;margin:0 0 22px\">Si \\u00E8 aperto il tuo programma di posta con la richiesta gi\\u00E0 pronta: controlla e premi <strong>Invia<\u002Fstrong> per recapitarla a La Positanina. Ti risponderemo presto con tutti i dettagli.<\u002Fp>\n            <button sc-camel-on-click=\"{{ resetForm }}\" style=\"padding:11px 22px;border-radius:30px;background:#fff;border:1.5px solid #DCCFB2;color:#2C3E63;font-weight:600;cursor:pointer\">Invia un'altra richiesta<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ formOpen }}\" hint-placeholder-val=\"{{ true }}\">\n          <form sc-camel-on-submit=\"{{ submitForm }}\" style=\"display:flex;flex-direction:column;gap:14px\">\n            <h3 style=\"font-family:'Cormorant Garamond',serif;font-size:26px;color:#2C3E63;margin:0 0 4px\">Richiedi la tua borsa<\u002Fh3>\n            <div style=\"display:grid;grid-template-columns:{{ fieldCols }};gap:14px\">\n              <label style=\"display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#5E5849\">Nome\n                <input required=\"\" name=\"nome\" type=\"text\" placeholder=\"Il tuo nome\" style=\"padding:12px 14px;border-radius:12px;border:1.5px solid #E6DAC2;background:#FDFAF2;font-size:14.5px;color:#3A3733;outline:none\" style-focus=\"border-color:#CDA85A\">\n              <\u002Flabel>\n              <label style=\"display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#5E5849\">Telefono\n                <input name=\"telefono\" type=\"tel\" placeholder=\"Il tuo numero\" style=\"padding:12px 14px;border-radius:12px;border:1.5px solid #E6DAC2;background:#FDFAF2;font-size:14.5px;color:#3A3733;outline:none\" style-focus=\"border-color:#CDA85A\">\n              <\u002Flabel>\n            <\u002Fdiv>\n            <label style=\"display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#5E5849\">Email\n              <input required=\"\" name=\"email\" type=\"email\" placeholder=\"La tua email\" style=\"padding:12px 14px;border-radius:12px;border:1.5px solid #E6DAC2;background:#FDFAF2;font-size:14.5px;color:#3A3733;outline:none\" style-focus=\"border-color:#CDA85A\">\n            <\u002Flabel>\n            <div style=\"display:grid;grid-template-columns:{{ fieldCols }};gap:14px\">\n              <label style=\"display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#5E5849\">Modello desiderato\n                <sc-raw-select name=\"modello\" style=\"padding:12px 14px;border-radius:12px;border:1.5px solid #E6DAC2;background:#FDFAF2;font-size:14.5px;color:#3A3733;outline:none\" style-focus=\"border-color:#CDA85A\">\n                  <option>Pochette<\u002Foption><option>Shopper<\u002Foption><option>Tracolla<\u002Foption><option>Non so ancora<\u002Foption>\n            <div><div style=\"font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:#9A9282;margin-bottom:3px\">Dimensioni<\u002Fdiv><div style=\"font-size:14.5px;color:#3A3733;font-weight:500\">{{ sel.size }}<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:#9A9282;margin-bottom:3px\">Tempi di realizzazione<\u002Fdiv><div style=\"font-size:14.5px;color:#3A3733;font-weight:500\">{{ sel.time }}<\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:#9A9282;margin-bottom:3px\">Prezzo<\u002Fdiv><div style=\"font-size:14.5px;color:#3A3733;font-weight:500\">{{ sel.price }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-bottom:10px\"><div style=\"font-size:11.5px;letter-spacing:1px;text-transform:uppercase;color:#9A9282;margin-bottom:8px\">Colori disponibili<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n                <sc-for list=\"{{ sel.colors }}\" as=\"c\" hint-placeholder-count=\"3\">\n                  <span style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;color:#5E5849;background:#fff;border:1px solid #EADFC9;border-radius:20px;padding:5px 12px 5px 6px\"><span style=\"width:15px;height:15px;border-radius:50%;background:{{ c.hex }};border:1px solid rgba(44,62,99,.14)\"><\u002Fspan>{{ c.name }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#F4EFE2;border:1px solid #EADFC9;border-radius:14px;padding:14px 16px;margin:18px 0 22px;font-size:14px;color:#5E5849;line-height:1.55\">🎨 <strong style=\"color:#2C3E63\">Personalizzabile:<\u002Fstrong> {{ sel.custom }}<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n              <a href=\"{{ sel.wa }}\" rel=\"noopener\" style=\"flex:1;min-width:160px;display:inline-flex;align-items:center;justify-content:center;gap:9px;text-decoration:none;background:#259E5D;color:#fff;padding:14px;border-radius:30px;font-weight:600;font-size:14.5px\" style-hover=\"background:#1f8a51\">\n                <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .2-3.4-.7-2.9-1.2-4.7-4.1-4.9-4.3-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.3 0 .5l-.4.6c-.2.2-.3.4-.1.7.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.5.1.7-.1l.8-1c.2-.2.4-.2.6-.1l1.9.9c.3.1.4.2.5.3.1.2.1.7-.1 1.3Z\"><\u002Fpath><\u002Fsvg> Richiedi su WhatsApp\n              <\u002Fa>\n              <button sc-camel-on-click=\"{{ sel.buy }}\" style=\"flex:1;min-width:160px;padding:14px;border-radius:30px;background:#2C3E63;color:#FBF6EC;font-weight:600;font-size:14.5px;border:none;cursor:pointer\" style-hover=\"background:#22304e\">Acquista online<\u002Fbutton>\n            <\u002Fdiv>\n            <p style=\"text-align:center;font-size:12px;color:#A29A88;margin:14px 0 0\">E-shop in arrivo — i pulsanti d'acquisto sono già predisposti.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ CART TOAST ============ -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:95;background:#2C3E63;color:#FBF6EC;padding:13px 22px;border-radius:30px;font-size:14px;font-weight:500;box-shadow:0 12px 30px rgba(44,62,99,.32);animation:lp_up .3s ease both\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    filter: 'Tutte',\n    selectedId: null,\n    cart: 0,\n    menuOpen: false,\n    w: 1200,\n    formSent: false,\n    toast: '',\n    externalProducts: null,\n    site: { hero: 'assets/hero.jpg', about: 'assets/about.jpg' },\n  };\n\n  componentDidMount() {\n    this._onResize = () => this.setState({ w: window.innerWidth });\n    this._onResize();\n    window.addEventListener('resize', this._onResize);\n    fetch('data/products.json').then(r => r.ok ? r.json() : null).then(d => { if (d) this.setState({ externalProducts: d }); }).catch(() => {});\n    fetch('data/site.json').then(r => r.ok ? r.json() : null).then(d => { if (d) this.setState({ site: d }); }).catch(() => {});\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n    clearTimeout(this._t);\n  }\n\n  wa(text) {\n    return 'https://wa.me/393346865176?text=' + encodeURIComponent(text);\n  }\n\n  rawProducts() {\n    return [\n      { id: 'amalfi', name: 'Pochette Amalfi', cat: 'Pochette', bg: '#B9D0E0',\n        desc: 'Pochette serale con manico a catenella in perline, perfetta per le sere d\\u2019estate.',\n        price: '\\u20AC 68', colors: [{name:'Blu polvere',hex:'#A7C2D6'},{name:'Crema',hex:'#F0E6D2'},{name:'Oro chiaro',hex:'#D9BE78'}],\n        long: 'Una pochette piccola e raffinata, lavorata a punto stretto per tenere la forma. Il manico in perline si pu\\u00F2 rimuovere per portarla come clutch.',\n        materials: 'Cotone 100% \\u00B7 perline in vetro', size: '24 \\u00D7 14 \\u00D7 5 cm', time: '2\\u20133 settimane',\n        custom: 'Puoi cambiare il colore del filato e scegliere perline tono su tono o a contrasto.' },\n      { id: 'vico', name: 'Shopper Vico', cat: 'Shopper', bg: '#E7D8BC',\n        desc: 'Shopper capiente da giorno, morbida e leggera, con manici comodi a spalla.',\n        price: '\\u20AC 95', colors: [{name:'Sabbia',hex:'#E2D2AE'},{name:'Avorio',hex:'#F4ECDA'},{name:'Corda',hex:'#C9B894'}],\n        long: 'La borsa di tutti i giorni: entra tutto e resta leggerissima. Fondo rinforzato e fodera interna in cotone con tasca.',\n        materials: 'Cotone naturale \\u00B7 fodera in cotone', size: '38 \\u00D7 34 \\u00D7 12 cm', time: '3 settimane',\n        custom: 'Disponibile con o senza fodera, con iniziali ricamate a mano su richiesta.' },\n      { id: 'marina', name: 'Tracolla Marina', cat: 'Tracolle', bg: '#F3E3AE',\n        desc: 'Tracolla regolabile dalla forma tonda, allegra e versatile per il giorno.',\n        price: '\\u20AC 78', colors: [{name:'Giallo limone',hex:'#EBD27A'},{name:'Bianco',hex:'#F6F0E2'}],\n        long: 'Una mezzaluna morbida con tracolla regolabile in lunghezza. Chiusura con bottone in legno e laccetto in crochet.',\n        materials: 'Cotone 100% \\u00B7 bottone in legno', size: '26 \\u00D7 18 \\u00D7 7 cm', time: '2 settimane',\n        custom: 'Tracolla disponibile anche in versione corta a spalla o lunga a bandoliera.' },\n      { id: 'limoncello', name: 'Pochette Limoncello', cat: 'Pochette', bg: '#EFE0A0',\n        desc: 'Piccola pochette solare, ispirata ai limoni della costiera.',\n        price: '\\u20AC 62', colors: [{name:'Giallo sole',hex:'#E9CF74'},{name:'Verde salvia',hex:'#BFC9A6'}],\n        long: 'Un concentrato di sud: gialla come i limoni, con dettaglio a foglia in verde salvia. Perfetta come dettaglio luminoso di un look estivo.',\n        materials: 'Cotone 100%', size: '22 \\u00D7 13 \\u00D7 4 cm', time: '2 settimane',\n        custom: 'Si pu\\u00F2 aggiungere un piccolo charm a forma di limone in ceramica.' },\n      { id: 'costiera', name: 'Shopper Costiera', cat: 'Shopper', bg: '#C7DAE6',\n        desc: 'Shopper dal blu del mare, ariosa e generosa, traforata a punto rete.',\n        price: '\\u20AC 98', colors: [{name:'Azzurro',hex:'#AECBDD'},{name:'Crema',hex:'#F0E6D2'}],\n        long: 'Lavorata a punto rete per un effetto traforato leggero. Si abbina a una pochette interna staccabile per gli oggetti piccoli.',\n        materials: 'Cotone naturale \\u00B7 pochette inclusa', size: '36 \\u00D7 32 \\u00D7 10 cm', time: '3 settimane',\n        custom: 'Punto rete pi\\u00F9 fitto o pi\\u00F9 aperto a seconda di come la vuoi usare.' },\n      { id: 'solara', name: 'Tracolla Solara', cat: 'Tracolle', bg: '#E5D4B0',\n        desc: 'Tracolla rotonda con dettagli oro chiaro, elegante per le occasioni.',\n        price: 'Prezzo su richiesta', colors: [{name:'Sabbia',hex:'#E2D2AE'},{name:'Oro chiaro',hex:'#D9BE78'}],\n        long: 'Forma a tamburello con manico rigido e finiture color oro chiaro. Un pezzo da cerimonia, fatto su misura per te.',\n        materials: 'Cotone \\u00B7 finiture metalliche dorate', size: '\\u00D8 22 \\u00D7 8 cm', time: '3\\u20134 settimane',\n        custom: 'Interamente personalizzabile nei colori e nelle finiture metalliche.' },\n      { id: 'sumisura', name: 'La tua, su misura', cat: 'Personalizzate', bg: '#DCE6E0',\n        desc: 'Partiamo da un\\u2019idea, una foto o un\\u2019occasione e creiamo la borsa che hai in mente.',\n        price: 'Prezzo su richiesta', colors: [{name:'A scelta',hex:'#F3E3AE'},{name:'A scelta',hex:'#A7C2D6'},{name:'A scelta',hex:'#E2D2AE'}],\n        long: 'Il pezzo davvero unico: scegli modello, colori, dimensioni e dettagli. Ti seguiamo passo passo, dalla prima idea alla consegna.',\n        materials: 'A scelta tra i nostri filati', size: 'Su misura', time: 'Da concordare',\n        custom: 'Tutto \\u00E8 personalizzabile: forma, colori, manici, fodera, iniziali e dettagli.' },\n    ];\n  }\n\n  filterList() { return ['Tutte','Pochette','Shopper','Tracolle','Personalizzate']; }\n\n  renderVals() {\n    const { filter, selectedId, cart, menuOpen, w, formSent, toast, externalProducts, site } = this.state;\n    const isMobile = w < 1024;\n    const all = externalProducts || this.rawProducts();\n    const hideImg = (e) => { e.target.style.display = 'none'; };\n\n    const products = all\n      .filter(p => filter === 'Tutte' || p.cat === filter)\n      .map(p => ({\n        ...p,\n        ph: 'foto \\u00B7 ' + p.name,\n        open: () => this.setState({ selectedId: p.id }),\n        buy: () => this.addToCart(p.name),\n      }));\n\n    const sel = selectedId ? (() => {\n      const p = all.find(x => x.id === selectedId);\n      return {\n        ...p,\n        starsFull: '\\u2605\\u2605\\u2605\\u2605\\u2605',\n        wa: this.wa('Ciao La Positanina, sono interessata alla borsa \\u201C' + p.name + '\\u201D. Potete darmi informazioni?'),\n        buy: () => this.addToCart(p.name),\n      };\n    })() : null;\n\n    const filters = this.filterList().map(label => {\n      const active = filter === label;\n      return {\n        label,\n        onClick: () => this.setState({ filter: label }),\n        bg: active ? '#2C3E63' : '#fff',\n        color: active ? '#FBF6EC' : '#4A463E',\n        border: active ? '#2C3E63' : '#DCCFB2',\n      };\n    });\n\n    const reviews = [\n      { name: 'Giulia M.', bagName: 'Shopper Vico', stars: '\\u2605\\u2605\\u2605\\u2605\\u2605', bg: '#E7D8BC',\n        text: 'Borsa bellissima, curata in ogni dettaglio. Si vede che \\u00E8 fatta con amore.' },\n      { name: 'Serena P.', bagName: 'Tracolla su misura', stars: '\\u2605\\u2605\\u2605\\u2605\\u2605', bg: '#C7DAE6',\n        text: 'Ho chiesto una personalizzazione nei colori e il risultato \\u00E8 stato perfetto.' },\n      { name: 'Antonella R.', bagName: 'Pochette Amalfi', stars: '\\u2605\\u2605\\u2605\\u2605\\u2605', bg: '#F3E3AE',\n        text: 'Elegante, leggera e diversa da tutte le borse che si trovano in giro.' },\n    ];\n\n    const customSteps = [\n      { n: '1', t: 'Raccontaci la tua idea o mandaci una foto di ispirazione' },\n      { n: '2', t: 'Scegliamo insieme modello, colori e dimensioni' },\n      { n: '3', t: 'Ti inviamo un preventivo e i tempi di realizzazione' },\n      { n: '4', t: 'Realizziamo la tua borsa a mano e te la spediamo' },\n    ];\n\n    const navItems = [\n      { label: 'Home', href: '#home' },\n      { label: 'Collezione', href: '#collezione' },\n      { label: 'Personalizzate', href: '#personalizzate' },\n      { label: 'Recensioni', href: '#recensioni' },\n      { label: 'Chi siamo', href: '#chi-siamo' },\n      { label: 'Contatti', href: '#contatti' },\n    ];\n\n    return {\n      hideImg,\n      heroImg: site.hero,\n      aboutImg: site.about,\n      navItems,\n      instagram: 'https://www.instagram.com/la_positanina?igsh=bGZzejIxMHFlOWlp',\n      waCustom: this.wa('Ciao La Positanina, vorrei informazioni sulle vostre borse crochet.'),\n      year: new Date().getFullYear(),\n\n      showDesktopNav: !isMobile,\n      showHamburger: isMobile,\n      mobilePanelOpen: isMobile && menuOpen,\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n\n      heroCols: isMobile ? '1fr' : '1.05fr .95fr',\n      formCols: isMobile ? '1fr' : '1fr 1.05fr',\n      aboutCols: isMobile ? '1fr' : '.85fr 1.15fr',\n      footerCols: isMobile ? '1fr' : '1.4fr 1fr 1.2fr',\n      modalCols: isMobile ? '1fr' : '.85fr 1.15fr',\n      fieldCols: isMobile ? '1fr' : '1fr 1fr',\n      heroBadgeLeft: isMobile ? '14px' : '-24px',\n      heroBadgeBottom: isMobile ? '14px' : '-26px',\n      heroCtaDir: isMobile ? 'column' : 'row',\n      detailCols: isMobile ? '1fr 1fr' : '1fr 1fr',\n      logoSize: isMobile ? '40px' : '46px',\n      brandSize: isMobile ? '20px' : '24px',\n\n      filters,\n      products,\n      noResults: products.length === 0,\n\n      cart,\n      hasCart: cart > 0,\n      openCart: () => this.addToCart(null),\n\n      reviews,\n      customSteps,\n\n      modalOpen: !!sel,\n      sel,\n      closeProduct: () => this.setState({ selectedId: null }),\n      stop: (e) => { e.stopPropagation(); },\n\n      formOpen: !formSent,\n      formSent,\n      submitForm: (e) => { e.preventDefault(); this.sendMail(e.target); },\n      resetForm: () => this.setState({ formSent: false }),\n\n      toast,\n    };\n  }\n\n  sendMail(form) {\n    const v = (k) => (form.elements[k] && form.elements[k].value || '').trim();\n    const subject = 'Richiesta borsa personalizzata \\u2014 La Positanina';\n    const body =\n      'Nome: ' + v('nome') + '\\n' +\n      'Email: ' + v('email') + '\\n' +\n      'Telefono: ' + v('telefono') + '\\n' +\n      'Modello desiderato: ' + v('modello') + '\\n' +\n      'Colori preferiti: ' + v('colori') + '\\n\\n' +\n      'Messaggio:\\n' + v('messaggio') + '\\n\\n' +\n      '(Se hai una foto di ispirazione, allegala a questa email prima di inviarla.)';\n    const href = 'mailto:vitaleraffaella36@gmail.com?subject=' +\n      encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);\n    try { window.location.href = href; } catch (err) { window.open(href, '_blank'); }\n    this.setState({ formSent: true });\n  }\n\n  addToCart(name) {\n    clearTimeout(this._t);\n    this.setState(s => ({\n      cart: s.cart + 1,\n      toast: name ? ('\\u201C' + name + '\\u201D aggiunta \\u00B7 e-shop in arrivo') : 'Carrello pronto per l\\u2019e-shop in arrivo',\n    }));\n    this._t = setTimeout(() => this.setState({ toast: '' }), 2600);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
