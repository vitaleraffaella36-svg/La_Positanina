document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d3942b30-9400-4c16-86f2-c28d27255079\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Mulish';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"41919e7c-fbe5-4c21-a83f-7bdfa3cb5fcb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  body{margin:0;background:#F4EFE2;color:#3A3733;font-family:'Mulish',sans-serif}\n  input,select,textarea,button{font-family:inherit}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100%;padding:clamp(16px,4vw,40px)\">\n  <div style=\"max-width:980px;margin:0 auto\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:26px\">\n      <img src=\"1fed092a-1af2-41b0-9e6a-e13abb490345\" alt=\"\" style=\"width:40px;height:40px;border-radius:50%;object-fit:cover\">\n      <div>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-size:26px;color:#2C3E63;margin:0\">Gestionale · La Positanina<\u002Fh1>\n        <p style=\"margin:2px 0 0;font-size:13px;color:#8A8377\">Foto, prezzi e modelli — salvati direttamente sul tuo repository GitHub<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showSetup }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:#fff;border-radius:18px;padding:28px;border:1px solid #EADFC9;max-width:560px\">\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:#2C3E63;margin:0 0 6px\">Collega il repository GitHub<\u002Fh2>\n        <p style=\"font-size:13.5px;color:#7A7468;line-height:1.6;margin:0 0 20px\">Serve un <strong>Personal Access Token<\u002Fstrong> GitHub con permesso di scrittura sul repository (Settings → Developer settings → Fine-grained tokens → Contents: Read and write). Il token resta salvato solo su questo browser.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <label style=\"display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:600;color:#5E5849\">Utente/organizzazione GitHub\n            <input value=\"{{ owner }}\" sc-camel-on-change=\"{{ setOwner }}\" placeholder=\"es. laraf\" style=\"padding:11px 13px;border-radius:10px;border:1.5px solid #E6DAC2;font-size:14.5px\">\n          <\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:600;color:#5E5849\">Nome del repository\n            <input value=\"{{ repo }}\" sc-camel-on-change=\"{{ setRepo }}\" placeholder=\"es. la-positanina\" style=\"padding:11px 13px;border-radius:10px;border:1.5px solid #E6DAC2;font-size:14.5px\">\n          <\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:600;color:#5E5849\">Branch\n            <input value=\"{{ branch }}\" sc-camel-on-change=\"{{ setBranch }}\" placeholder=\"main\" style=\"padding:11px 13px;border-radius:10px;border:1.5px solid #E6DAC2;font-size:14.5px\">\n          <\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:600;color:#5E5849\">Personal Access Token\n            <input type=\"password\" value=\"{{ token }}\" sc-camel-on-change=\"{{ setToken }}\" placeholder=\"ghp_...\" style=\"padding:11px 13px;border-radius:10px;border:1.5px solid #E6DAC2;font-size:14.5px\">\n          <\u002Flabel>\n          <button sc-camel-on-click=\"{{ connect }}\" disabled=\"{{ connecting }}\" style=\"margin-top:6px;padding:13px;border-radius:30px;background:#2C3E63;color:#fff;font-weight:600;border:none;cursor:pointer\">{{ connectLabel }}<\u002Fbutton>\n          <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n            <p style=\"color:#B23A3A;font-size:13.5px;margin:0\">{{ error }}<\u002Fp>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showDashboard }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px\">\n        <span style=\"font-size:13px;color:#7A7468\">Connesso a <strong style=\"color:#2C3E63\">{{ owner }}/{{ repo }}<\u002Fstrong> ({{ branch }})<\u002Fspan>\n        <button sc-camel-on-click=\"{{ disconnect }}\" style=\"padding:8px 16px;border-radius:20px;border:1.5px solid #DCCFB2;background:#fff;color:#2C3E63;font-size:13px;cursor:pointer\">Disconnetti<\u002Fbutton>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ notice }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#EDF6F0;border:1px solid #BFE0CB;color:#1f6b3f;padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:16px\">{{ notice }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ error }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#FBEAEA;border:1px solid #E7BABA;color:#B23A3A;padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:16px\">{{ error }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"background:#fff;border-radius:18px;padding:24px;border:1px solid #EADFC9;margin-bottom:24px\">\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:20px;color:#2C3E63;margin:0 0 14px\">Foto del sito<\u002Fh2>\n        <div style=\"display:flex;gap:20px;flex-wrap:wrap\">\n          <div style=\"width:150px\">\n            <div style=\"font-size:12.5px;font-weight:600;color:#5E5849;margin-bottom:6px\">Foto hero (home)<\u002Fdiv>\n            <div style=\"width:150px;height:150px;border-radius:12px;background:#EFE7D4;overflow:hidden;position:relative;margin-bottom:8px\">\n              <sc-if value=\"{{ heroPreview }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ heroPreview }}\" style=\"width:100%;height:100%;object-fit:cover\"><\u002Fsc-if>\n            <\u002Fdiv>\n            <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ uploadHero }}\" style=\"font-size:11.5px;width:150px\">\n          <\u002Fdiv>\n          <div style=\"width:150px\">\n            <div style=\"font-size:12.5px;font-weight:600;color:#5E5849;margin-bottom:6px\">Foto atelier (chi siamo)<\u002Fdiv>\n            <div style=\"width:150px;height:150px;border-radius:12px;background:#EFE7D4;overflow:hidden;position:relative;margin-bottom:8px\">\n              <sc-if value=\"{{ aboutPreview }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ aboutPreview }}\" style=\"width:100%;height:100%;object-fit:cover\"><\u002Fsc-if>\n            <\u002Fdiv>\n            <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ uploadAbout }}\" style=\"font-size:11.5px;width:150px\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px\">\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-size:20px;color:#2C3E63;margin:0\">Modelli ({{ productCount }})<\u002Fh2>\n        <button sc-camel-on-click=\"{{ addProduct }}\" style=\"padding:9px 18px;border-radius:20px;background:#CDA85A;color:#fff;font-weight:600;font-size:13.5px;border:none;cursor:pointer\">+ Nuovo modello<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:16px\">\n        <sc-for list=\"{{ products }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border-radius:16px;border:1px solid #EADFC9;padding:20px;display:grid;grid-template-columns:130px 1fr;gap:18px\">\n            <div>\n              <div style=\"width:130px;height:130px;border-radius:10px;background:#EFE7D4;overflow:hidden;margin-bottom:8px\">\n                <sc-if value=\"{{ p.preview }}\" hint-placeholder-val=\"{{ false }}\"><img src=\"{{ p.preview }}\" style=\"width:100%;height:100%;object-fit:cover\"><\u002Fsc-if>\n              <\u002Fdiv>\n              <input type=\"file\" accept=\"image/*\" sc-camel-on-change=\"{{ p.uploadPhoto }}\" style=\"font-size:11px;width:130px\">\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px\">\n              <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px\">\n                <input value=\"{{ p.name }}\" sc-camel-on-change=\"{{ p.setName }}\" placeholder=\"Nome modello\" style=\"padding:9px 11px;border-radius:8px;border:1.5px solid #E6DAC2;font-size:14px;font-weight:600\">\n                <sc-raw-select value=\"{{ p.cat }}\" sc-camel-on-change=\"{{ p.setCat }}\" style=\"padding:9px 11px;border-radius:8px;border:1.5px solid #E6DAC2;font-size:13px\">\n                  <option value=\"Pochette\">Pochette<\u002Foption><option value=\"Shopper\">Shopper<\u002Foption><option value=\"Tracolle\">Tracolle<\u002Foption><option value=\"Personalizzate\">Personalizzate<\u002Foption>\n                <\u002Fsc-raw-select>\n                <input value=\"{{ p.price }}\" sc-camel-on-change=\"{{ p.setPrice }}\" placeholder=\"Prezzo\" style=\"padding:9px 11px;border-radius:8px;border:1.5px solid #E6DAC2;font-size:13px\">\n              <\u002Fdiv>\n              <textarea value=\"{{ p.desc }}\" sc-camel-on-change=\"{{ p.setDesc }}\" placeholder=\"Breve descrizione (card)\" rows=\"2\" style=\"padding:9px 11px;border-radius:8px;border:1.5px solid #E6DAC2;font-size:13px;resize:vertical\"><\u002Ftextarea>\n              <input value=\"{{ p.colorsText }}\" sc-camel-on-change=\"{{ p.setColors }}\" placeholder=\"Colori — es. Blu polvere:#A7C2D6, Crema:#F0E6D2\" style=\"padding:9px 11px;border-radius:8px;border:1.5px solid #E6DAC2;font-size:12.5px\">\n              <div style=\"text-align:right\">\n                <button sc-camel-on-click=\"{{ p.remove }}\" style=\"padding:7px 14px;border-radius:16px;border:1.5px solid #E7BABA;background:#fff;color:#B23A3A;font-size:12.5px;cursor:pointer\">Elimina modello<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"position:sticky;bottom:16px;margin-top:26px;display:flex;justify-content:center\">\n        <button sc-camel-on-click=\"{{ saveAll }}\" disabled=\"{{ saving }}\" style=\"padding:15px 36px;border-radius:30px;background:#2C3E63;color:#fff;font-weight:700;font-size:15px;border:none;cursor:pointer;box-shadow:0 12px 30px rgba(44,62,99,.3)\">{{ saveLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    owner: '', repo: '', branch: 'main', token: '',\n    connected: false, connecting: false, saving: false,\n    error: '', notice: '',\n    products: [], productsSha: null,\n    heroPreview: '', aboutPreview: '',\n    heroFile: null, aboutFile: null,\n  };\n\n  componentDidMount() {\n    try {\n      const saved = JSON.parse(localStorage.getItem('lp_admin_gh') || 'null');\n      if (saved) this.setState(saved, () => this.loadAll());\n    } catch (e) {}\n  }\n\n  gh(path, opts) {\n    const base = 'https://api.github.com/repos/' + this.state.owner.trim() + '/' + this.state.repo.trim();\n    const url = path ? base + '/' + path : base;\n    return fetch(url, {\n      ...opts,\n      headers: {\n        'Authorization': 'Bearer ' + this.state.token.trim(),\n        'Accept': 'application/vnd.github+json',\n        'X-GitHub-Api-Version': '2022-11-28',\n        ...(opts && opts.headers || {}),\n      },\n    });\n  }\n\n  b64EncodeUnicode(str) { return btoa(unescape(encodeURIComponent(str))); }\n  b64DecodeUnicode(str) { return decodeURIComponent(escape(atob(str))); }\n\n  async getFile(path) {\n    const res = await this.gh('contents/' + path + '?ref=' + encodeURIComponent(this.state.branch));\n    if (res.status === 404) return { sha: null, content: null };\n    if (!res.ok) throw new Error('Errore leggendo ' + path + ' (' + res.status + ')');\n    const j = await res.json();\n    return { sha: j.sha, content: this.b64DecodeUnicode(j.content.replace(/\\n/g, '')) };\n  }\n\n  async putFile(path, base64Content, message, sha) {\n    const res = await this.gh('contents/' + path, {\n      method: 'PUT',\n      body: JSON.stringify({ message, content: base64Content, branch: this.state.branch, ...(sha ? { sha } : {}) }),\n    });\n    if (!res.ok) { const t = await res.text(); throw new Error('Errore salvando ' + path + ': ' + t.slice(0, 200)); }\n    return res.json();\n  }\n\n  async fileToBase64(file) {\n    return new Promise((resolve, reject) => {\n      const r = new FileReader();\n      r.onload = () => resolve(r.result.split(',')[1]);\n      r.onerror = reject;\n      r.readAsDataURL(file);\n    });\n  }\n\n  connect = async () => {\n    this.setState({ connecting: true, error: '' });\n    try {\n      const res = await this.gh('');\n      if (!res.ok) {\n        const detail = await res.text().catch(() => '');\n        throw new Error('Impossibile collegarsi (' + res.status + '): controlla utente, repository e token. ' + detail.slice(0, 150));\n      }\n      localStorage.setItem('lp_admin_gh', JSON.stringify({\n        owner: this.state.owner, repo: this.state.repo, branch: this.state.branch, token: this.state.token, connected: true,\n      }));\n      this.setState({ connected: true, connecting: false }, () => this.loadAll());\n    } catch (e) {\n      this.setState({ error: e.message, connecting: false });\n    }\n  };\n\n  disconnect = () => {\n    localStorage.removeItem('lp_admin_gh');\n    this.setState({ connected: false, products: [], token: '' });\n  };\n\n  async loadAll() {\n    try {\n      const p = await this.getFile('data/products.json');\n      const products = p.content ? JSON.parse(p.content) : [];\n      this.setState({ products, productsSha: p.sha });\n      const s = await this.getFile('data/site.json');\n      const site = s.content ? JSON.parse(s.content) : { hero: 'assets/hero.jpg', about: 'assets/about.jpg' };\n      this.setState({ siteSha: s.sha, site });\n      this.previewImage('assets/hero.jpg', 'heroPreview');\n      this.previewImage('assets/about.jpg', 'aboutPreview');\n      products.forEach(pr => this.previewProductImage(pr.id));\n    } catch (e) {\n      this.setState({ error: e.message });\n    }\n  }\n\n  async previewImage(path, key) {\n    try {\n      const f = await this.getFile(path);\n      if (f.content) this.setState({ [key]: 'data:image/jpeg;base64,' + this.b64EncodeUnicode(f.content) });\n    } catch (e) {}\n  }\n\n  async previewProductImage(id) {\n    try {\n      const res = await this.gh('contents/assets/products/' + id + '.jpg?ref=' + this.state.branch);\n      if (res.ok) {\n        const j = await res.json();\n        this.setState(s => ({ products: s.products.map(pr => pr.id === id ? { ...pr, _preview: 'data:image/jpeg;base64,' + j.content.replace(/\\n/g, '') } : pr) }));\n      }\n    } catch (e) {}\n  }\n\n  slug(name) {\n    return (name || 'modello').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'modello';\n  }\n\n  updateProduct(id, patch) {\n    this.setState(s => ({ products: s.products.map(p => p.id === id ? { ...p, ...patch } : p) }));\n  }\n\n  parseColors(text) {\n    return (text || '').split(',').map(s => s.trim()).filter(Boolean).map(pair => {\n      const [name, hex] = pair.split(':').map(x => x && x.trim());\n      return { name: name || 'Colore', hex: hex || '#CDA85A' };\n    });\n  }\n\n  addProduct = () => {\n    const id = 'nuovo-' + Date.now();\n    this.setState(s => ({\n      products: [...s.products, {\n        id, name: 'Nuovo modello', cat: 'Pochette', bg: '#E7D8BC', desc: '', long: '', materials: '', size: '', time: '',\n        price: 'Prezzo su richiesta', colors: [], custom: '', img: 'assets/products/' + id + '.jpg',\n      }],\n    }));\n  };\n\n  saveAll = async () => {\n    this.setState({ saving: true, error: '', notice: '' });\n    try {\n      const clean = this.state.products.map(({ _preview, colorsText, ...p }) => p);\n      const content = this.b64EncodeUnicode(JSON.stringify(clean, null, 2));\n      const res = await this.putFile('data/products.json', content, 'Aggiorna modelli dal gestionale', this.state.productsSha);\n      this.setState({ productsSha: res.content.sha, saving: false, notice: 'Salvato! Le modifiche sono live sul sito.' });\n      setTimeout(() => this.setState({ notice: '' }), 4000);\n    } catch (e) {\n      this.setState({ error: e.message, saving: false });\n    }\n  };\n\n  uploadHero = async (e) => {\n    const file = e.target.files[0]; if (!file) return;\n    try {\n      const b64 = await this.fileToBase64(file);\n      const existing = await this.getFile('assets/hero.jpg');\n      await this.putFile('assets/hero.jpg', b64, 'Aggiorna foto hero', existing.sha);\n      this.setState({ heroPreview: 'data:' + file.type + ';base64,' + b64, notice: 'Foto hero aggiornata!' });\n      setTimeout(() => this.setState({ notice: '' }), 3000);\n    } catch (err) { this.setState({ error: err.message }); }\n  };\n\n  uploadAbout = async (e) => {\n    const file = e.target.files[0]; if (!file) return;\n    try {\n      const b64 = await this.fileToBase64(file);\n      const existing = await this.getFile('assets/about.jpg');\n      await this.putFile('assets/about.jpg', b64, 'Aggiorna foto atelier', existing.sha);\n      this.setState({ aboutPreview: 'data:' + file.type + ';base64,' + b64, notice: 'Foto atelier aggiornata!' });\n      setTimeout(() => this.setState({ notice: '' }), 3000);\n    } catch (err) { this.setState({ error: err.message }); }\n  };\n\n  uploadProductPhoto = async (id, e) => {\n    const file = e.target.files[0]; if (!file) return;\n    try {\n      const b64 = await this.fileToBase64(file);\n      const path = 'assets/products/' + id + '.jpg';\n      const existing = await this.getFile(path);\n      await this.putFile(path, b64, 'Aggiorna foto modello ' + id, existing.sha);\n      this.updateProduct(id, { _preview: 'data:' + file.type + ';base64,' + b64, img: path });\n      this.setState({ notice: 'Foto aggiornata! Ricorda di premere Salva tutto per confermare i testi.' });\n      setTimeout(() => this.setState({ notice: '' }), 4000);\n    } catch (err) { this.setState({ error: err.message }); }\n  };\n\n  renderVals() {\n    const s = this.state;\n    const products = s.products.map(p => ({\n      ...p,\n      preview: p._preview || '',\n      colorsText: p.colorsText !== undefined ? p.colorsText : (p.colors || []).map(c => c.name + ':' + c.hex).join(', '),\n      setName: (e) => this.updateProduct(p.id, { name: e.target.value }),\n      setCat: (e) => this.updateProduct(p.id, { cat: e.target.value }),\n      setPrice: (e) => this.updateProduct(p.id, { price: e.target.value }),\n      setDesc: (e) => this.updateProduct(p.id, { desc: e.target.value, long: p.long || e.target.value }),\n      setColors: (e) => this.updateProduct(p.id, { colorsText: e.target.value, colors: this.parseColors(e.target.value) }),\n      uploadPhoto: (e) => this.uploadProductPhoto(p.id, e),\n      remove: () => { if (confirm('Eliminare \"' + p.name + '\"?')) this.setState(st => ({ products: st.products.filter(x => x.id !== p.id) })); },\n    }));\n\n    return {\n      showSetup: !s.connected,\n      showDashboard: s.connected,\n      owner: s.owner, repo: s.repo, branch: s.branch, token: s.token,\n      setOwner: (e) => this.setState({ owner: e.target.value }),\n      setRepo: (e) => this.setState({ repo: e.target.value }),\n      setBranch: (e) => this.setState({ branch: e.target.value || 'main' }),\n      setToken: (e) => this.setState({ token: e.target.value }),\n      connect: this.connect,\n      connecting: s.connecting,\n      connectLabel: s.connecting ? 'Connessione…' : 'Connetti',\n      disconnect: this.disconnect,\n      error: s.error, notice: s.notice,\n      heroPreview: s.heroPreview, aboutPreview: s.aboutPreview,\n      uploadHero: this.uploadHero, uploadAbout: this.uploadAbout,\n      products, productCount: products.length,\n      addProduct: this.addProduct,\n      saveAll: this.saveAll, saving: s.saving,\n      saveLabel: s.saving ? 'Salvataggio…' : 'Salva tutto su GitHub',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
